"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оВґ](red)\
$os\
$username\
[оВ∞](bg:peach fg:red)\
$directory\
[оВ∞](bg:yellow fg:peach)\
$git_branch\
$git_status\
[оВ∞](fg:yellow bg:green)\
$nodejs\
$php\
[оВ∞](fg:green bg:lavender)\
$time\
[оВі ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "оЬП"
Ubuntu = "у∞ХИ"
SUSE = "пМФ"
Raspbian = "у∞Рњ"
Mint = "у∞£≠"
Macos = "пМВ"
Manjaro = "пМТ"
Linux = "у∞Мљ"
Gentoo = "у∞£®"
Fedora = "у∞£Ы"
Alpine = "пМА"
Amazon = "пЙ∞"
Android = "оЬО"
AOSC = "пМБ"
Arch = "у∞£З"
Artix = "у∞£З"
CentOS = "пМД"
Debian = "у∞£Ъ"
Redhat = "у±ДЫ"
RedHatEnterprise = "у±ДЫ"

[username]
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'
aliases = { "yuri.sementsov@usgroup.loc" = "Yuri.Sementsov" }

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "у∞ЭЪ "
"Pictures" = "пАЊ "
"Developer" = "у∞≤Л "

[git_branch]
symbol = "пРШ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
stashed = ""
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оШИ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ пРЇ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[вЭѓ](bold fg:green)'
error_symbol = '[вЭѓ](bold fg:red)'
vimcmd_symbol = '[вЭЃ](bold fg:green)'
vimcmd_replace_one_symbol = '[вЭЃ](bold fg:lavender)'
vimcmd_replace_symbol = '[вЭЃ](bold fg:lavender)'
vimcmd_visual_symbol = '[вЭЃ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "оЂі in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

